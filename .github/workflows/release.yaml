name: Release

on:
  workflow_dispatch:
    inputs:
      version_input:
        description: APKMirror version to build. Leave blank for the latest release.
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build APKs
        run: |
          if [ -n "${{ github.event.inputs.version_input }}" ]; then
            uv run main.py build --version "${{ github.event.inputs.version_input }}"
          else
            uv run main.py build
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run main.py release
